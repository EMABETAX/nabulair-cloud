<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NabulAir PRO - Controllo Remoto Cloud</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: #fff;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        @keyframes ripple {
            0% { transform: scale(0); opacity: 0.5; }
            100% { transform: scale(4); opacity: 0; }
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .glass-header {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 20px 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .logo-area { display: flex; align-items: center; gap: 15px; }
        .logo-icon {
            width: 50px; height: 50px;
            background: linear-gradient(135deg, #00d4ff, #7b2ff7);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: 0 8px 32px rgba(0,212,255,0.3);
        }
        .logo-text h1 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #00d4ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .logo-text p { font-size: 12px; opacity: 0.7; }
        .connection-status {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0,0,0,0.3);
            padding: 10px 20px;
            border-radius: 50px;
        }
        .status-led {
            width: 12px; height: 12px;
            border-radius: 50%;
            background: #e53e3e;
            animation: pulse 2s infinite;
        }
        .status-led.online { background: #00e676; box-shadow: 0 0 10px #00e676; }
        .ip-badge {
            font-family: monospace;
            font-size: 14px;
            background: rgba(0,0,0,0.5);
            padding: 5px 12px;
            border-radius: 20px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .stat-card:hover {
            transform: translateY(-5px);
            border-color: rgba(0,212,255,0.5);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .stat-icon { font-size: 40px; margin-bottom: 15px; }
        .stat-label { font-size: 14px; opacity: 0.7; text-transform: uppercase; letter-spacing: 1px; }
        .stat-value {
            font-size: 36px;
            font-weight: 800;
            margin-top: 10px;
            background: linear-gradient(135deg, #fff, #00d4ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .stat-unit { font-size: 14px; opacity: 0.5; }
        .control-panel {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .panel-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .button-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
        }
        .btn-remote {
            padding: 18px 25px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }
        .btn-start { background: linear-gradient(135deg, #00e676, #00b0ff); color: white; box-shadow: 0 5px 20px rgba(0,230,118,0.3); }
        .btn-stop { background: linear-gradient(135deg, #ff5252, #e53935); color: white; box-shadow: 0 5px 20px rgba(255,82,82,0.3); }
        .btn-wash { background: linear-gradient(135deg, #2196f3, #1976d2); color: white; }
        .btn-test { background: linear-gradient(135deg, #ff9800, #f57c00); color: white; }
        .btn-remote:hover { transform: translateY(-3px); filter: brightness(1.05); }
        .btn-remote:active { transform: translateY(0); }
        .main-status { display: flex; justify-content: center; margin: 30px 0; }
        .status-circle {
            width: 200px; height: 200px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00d4ff, #7b2ff7);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: 0 0 60px rgba(0,212,255,0.5);
            animation: pulse 2s infinite;
        }
        .status-circle::before {
            content: '';
            position: absolute;
            width: 100%; height: 100%;
            border-radius: 50%;
            background: rgba(0,212,255,0.3);
            animation: ripple 2s infinite;
        }
        .status-text { font-size: 28px; font-weight: 800; z-index: 1; }
        .status-subtext { font-size: 14px; opacity: 0.9; z-index: 1; margin-top: 10px; }
        .timer-ring {
            position: absolute;
            top: -10px; left: -10px; right: -10px; bottom: -10px;
            border-radius: 50%;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            animation: spin 1s linear infinite;
        }
        .programs-section {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .programs-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }
        .programs-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-height: 400px;
            overflow-y: auto;
        }
        .program-item {
            background: rgba(255,255,255,0.03);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            border-left: 4px solid #00d4ff;
        }
        .program-info { flex: 1; }
        .program-name { font-weight: 700; font-size: 18px; margin-bottom: 8px; }
        .program-details { font-size: 13px; opacity: 0.7; display: flex; gap: 20px; flex-wrap: wrap; }
        .program-badge {
            background: rgba(0,212,255,0.2);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
        }
        .program-badge.active { background: rgba(0,230,118,0.2); color: #00e676; }
        .machine-selector {
            margin-bottom: 20px;
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 20px;
        }
        select, input {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 15px;
            color: white;
            font-size: 16px;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 50px;
            border-left: 4px solid #00d4ff;
            transform: translateX(400px);
            transition: transform 0.3s;
            z-index: 1100;
        }
        .toast.show { transform: translateX(0); }
        .loading-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .loading-spinner {
            width: 50px; height: 50px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @media (max-width: 768px) {
            .container { padding: 15px; }
            .stat-value { font-size: 28px; }
            .status-circle { width: 150px; height: 150px; }
            .status-text { font-size: 22px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="glass-header">
        <div class="logo-area">
            <div class="logo-icon">🌿</div>
            <div class="logo-text">
                <h1>NABULAIR PRO</h1>
                <p>Controllo Remoto Cloud</p>
            </div>
        </div>
        <div class="connection-status">
            <div class="status-led" id="statusLed"></div>
            <span id="statusText">Caricamento...</span>
            <span class="ip-badge" id="machineName">--</span>
        </div>
    </div>

    <!-- Selezione macchina -->
    <div class="machine-selector">
        <label>📟 Seleziona Macchina:</label>
        <select id="machineSelect"></select>
    </div>

    <!-- Stats Grid -->
    <div class="stats-grid">
        <div class="stat-card"><div class="stat-icon">💧</div><div class="stat-label">Stato Acqua</div><div class="stat-value" id="waterLevel">--</div></div>
        <div class="stat-card"><div class="stat-icon">🧪</div><div class="stat-label">Insetticida</div><div class="stat-value" id="insecticideLevel">--</div></div>
        <div class="stat-card"><div class="stat-icon">📊</div><div class="stat-label">Flusso (L/min)</div><div class="stat-value" id="flowRate">0</div></div>
        <div class="stat-card"><div class="stat-icon">⏱️</div><div class="stat-label">Ultima attività</div><div class="stat-value" id="lastSeen">--</div></div>
    </div>

    <!-- Main Status Circle -->
    <div class="main-status">
        <div class="status-circle" id="statusCircle">
            <div class="status-text" id="mainStatusText">OFFLINE</div>
            <div class="status-subtext" id="timerText"></div>
            <div class="timer-ring" id="timerRing" style="display: none;"></div>
        </div>
    </div>

    <!-- Control Panel -->
    <div class="control-panel">
        <div class="panel-title"><span>🎮</span> Comandi Remoti (Cloud)</div>
        <div class="button-group">
            <button class="btn-remote btn-start" id="btnStart">▶️ AVVIA CICLO (2%)</button>
            <button class="btn-remote btn-stop" id="btnStop">⏹️ STOP</button>
            <button class="btn-remote btn-wash" id="btnWash">🚿 LAVAGGIO</button>
            <button class="btn-remote btn-test" id="btnTest">🔬 TEST (1%)</button>
            <button class="btn-remote" id="btnReboot" style="background:#6c757d;">🔄 RIAVVIA</button>
            <button class="btn-remote" id="btnSyncTime" style="background:#17a2b8;">🕒 SINCRONIZZA ORA</button>
        </div>
    </div>

    <!-- Programs Section -->
    <div class="programs-section">
        <div class="programs-header">
            <div class="panel-title"><span>📅</span> Programmi della Macchina</div>
            <button class="btn-remote" id="refreshProgramsBtn" style="background:#28a745; padding:10px 20px;">🔄 Ricarica</button>
        </div>
        <div class="programs-list" id="programsList">
            <div style="text-align: center; padding: 40px;">Seleziona una macchina</div>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>
<div class="loading-overlay" id="loading"><div class="loading-spinner"></div></div>

<script>
    // --- Configurazione Cloud ---
    const API_BASE = '';  // usa la stessa origine
    let token = localStorage.getItem('token');
    let currentMachineId = null;
    let machines = [];
    let statusInterval = null;

    // Helper API autenticata
    async function apiCall(endpoint, method = 'GET', body = null) {
        const url = API_BASE + endpoint;
        const options = {
            method,
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            }
        };
        if (body) options.body = JSON.stringify(body);
        try {
            const res = await fetch(url, options);
            const data = await res.json();
            if (!res.ok) throw new Error(data.message || 'Errore API');
            return data;
        } catch (err) {
            console.error('API Error:', err);
            showToast(err.message, 'error');
            return null;
        }
    }

    // Carica lista macchine accessibili
    async function loadMachines() {
        const data = await apiCall('/api/machines');
        if (data && data.success && data.machines) {
            machines = data.machines;
            const select = document.getElementById('machineSelect');
            select.innerHTML = '<option value="">-- Seleziona una macchina --</option>';
            machines.forEach(m => {
                const option = document.createElement('option');
                option.value = m.id;
                option.textContent = `${m.machine_name || m.mac_address} (${m.status || 'offline'})`;
                select.appendChild(option);
            });
            if (machines.length > 0) {
                select.value = machines[0].id;
                select.dispatchEvent(new Event('change'));
            }
        } else {
            showToast('Nessuna macchina trovata', 'error');
        }
    }

    // Aggiorna stato della macchina corrente
    async function updateMachineStatus() {
        if (!currentMachineId) return;
        const data = await apiCall(`/api/machine/${currentMachineId}`);
        if (data && data.success) {
            const m = data.machine;
            const isOnline = m.status === 'online';
            document.getElementById('statusLed').classList.toggle('online', isOnline);
            document.getElementById('statusText').innerText = isOnline ? 'Online' : 'Offline';
            document.getElementById('machineName').innerText = m.machine_name || m.mac_address;
            document.getElementById('waterLevel').innerHTML = m.water_ok ? '✅ OK' : '❌ BASSO';
            document.getElementById('waterLevel').style.color = m.water_ok ? '#00e676' : '#ff5252';
            document.getElementById('insecticideLevel').innerHTML = m.insecticide_ok ? '✅ OK' : '❌ ESAURITO';
            document.getElementById('insecticideLevel').style.color = m.insecticide_ok ? '#00e676' : '#ff5252';
            document.getElementById('flowRate').innerHTML = (m.flow || 0).toFixed(2);
            document.getElementById('lastSeen').innerHTML = m.last_seen ? new Date(m.last_seen).toLocaleTimeString() : 'mai';
            
            const mainText = document.getElementById('mainStatusText');
            const timerRing = document.getElementById('timerRing');
            if (isOnline) {
                mainText.innerHTML = '✅ ONLINE';
                mainText.style.color = '#00e676';
                timerRing.style.display = 'none';
            } else {
                mainText.innerHTML = '⚠️ OFFLINE';
                mainText.style.color = '#ff5252';
                timerRing.style.display = 'none';
            }
        }
    }

    // Carica programmi della macchina
    async function loadPrograms() {
        if (!currentMachineId) return;
        const data = await apiCall(`/api/machines/${currentMachineId}/programs`);
        const container = document.getElementById('programsList');
        if (data && data.success && Array.isArray(data.programs)) {
            const progs = data.programs;
            if (progs.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 40px; opacity: 0.7;">📭 Nessun programma configurato</div>';
                return;
            }
            container.innerHTML = progs.map(prog => {
                const daysMap = ['Lun', 'Mar', 'Mer', 'Gio', 'Ven', 'Sab', 'Dom'];
                const days = (prog.days || []).map(d => daysMap[d-1]).join(', ');
                return `
                    <div class="program-item">
                        <div class="program-info">
                            <div class="program-name">${escapeHtml(prog.nome || 'Programma')}</div>
                            <div class="program-details">
                                <span>⏰ ${prog.orario || '--:--'}</span>
                                <span>⏱️ ${prog.durata || 120}s</span>
                                <span>🧪 ${prog.percentuale || 1.5}%</span>
                                <span>📅 ${days}</span>
                            </div>
                        </div>
                        <div class="program-actions">
                            <span class="program-badge ${prog.attivo ? 'active' : ''}">
                                ${prog.attivo ? '✅ ATTIVO' : '⭕ DISATTIVO'}
                            </span>
                        </div>
                    </div>
                `;
            }).join('');
        } else {
            container.innerHTML = '<div style="text-align: center; padding: 40px;">❌ Errore caricamento programmi</div>';
        }
    }

    // Invio comando generico
    async function sendCommand(type, payload = {}) {
        if (!currentMachineId) {
            showToast('Seleziona una macchina', 'error');
            return false;
        }
        showLoading(true);
        const data = await apiCall(`/api/machines/${currentMachineId}/command`, 'POST', { type, payload });
        showLoading(false);
        if (data && data.success) {
            showToast(`✅ Comando ${type} inviato`, 'success');
            return true;
        } else {
            showToast(`❌ Errore: ${data?.message || 'comando fallito'}`, 'error');
            return false;
        }
    }

    // Comandi specifici
    async function startCycle(percentuale = 2.0, lavaggio = false) {
        if (lavaggio) percentuale = 0;
        await sendCommand('start_cycle', { percentuale, lavaggio });
    }
    async function stopCycle() { await sendCommand('stop_cycle'); }  // Se il backend supporta stop
    async function washCycle() { await startCycle(0, true); }
    async function testCycle() { await startCycle(1.0, false); }
    async function reboot() { await sendCommand('reboot'); }
    async function syncTime() { await sendCommand('sync_time'); }

    // Utility
    function showToast(message, type = 'info') {
        const toast = document.getElementById('toast');
        toast.innerHTML = message;
        toast.style.borderLeftColor = type === 'error' ? '#ff5252' : '#00e676';
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }
    function showLoading(show) {
        document.getElementById('loading').style.display = show ? 'flex' : 'none';
    }
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // Eventi selezione macchina
    document.getElementById('machineSelect').addEventListener('change', (e) => {
        currentMachineId = parseInt(e.target.value);
        if (currentMachineId) {
            updateMachineStatus();
            loadPrograms();
            if (statusInterval) clearInterval(statusInterval);
            statusInterval = setInterval(() => {
                updateMachineStatus();
            }, 5000);
        } else {
            if (statusInterval) clearInterval(statusInterval);
            document.getElementById('programsList').innerHTML = '<div style="text-align: center; padding: 40px;">Seleziona una macchina</div>';
        }
    });

    // Bottoni comandi
    document.getElementById('btnStart').addEventListener('click', () => startCycle(2.0, false));
    document.getElementById('btnStop').addEventListener('click', stopCycle);
    document.getElementById('btnWash').addEventListener('click', washCycle);
    document.getElementById('btnTest').addEventListener('click', testCycle);
    document.getElementById('btnReboot').addEventListener('click', reboot);
    document.getElementById('btnSyncTime').addEventListener('click', syncTime);
    document.getElementById('refreshProgramsBtn').addEventListener('click', loadPrograms);

    // Controllo autenticazione
    async function checkAuth() {
        if (!token) {
            window.location.href = '/dashboard.html';
            return false;
        }
        const me = await apiCall('/api/me');
        if (!me || !me.success) {
            localStorage.removeItem('token');
            window.location.href = '/dashboard.html';
            return false;
        }
        return true;
    }

    // Avvio
    (async () => {
        if (!(await checkAuth())) return;
        await loadMachines();
    })();
</script>
</body>
</html>
