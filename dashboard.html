<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NabulAir Cloud - Centrale Operativa</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: white;
        }
        
        .header {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .logo-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #00d4ff, #7b2ff7);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }
        
        .stats-summary {
            display: flex;
            gap: 20px;
        }
        
        .stat-pill {
            background: rgba(0,0,0,0.3);
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 14px;
        }
        
        .container {
            max-width: 1400px;
            margin: 30px auto;
            padding: 0 20px;
        }
        
        /* Tabella Macchine */
        .machines-table {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th {
            text-align: left;
            padding: 20px;
            background: rgba(0,0,0,0.3);
            font-weight: 600;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        td {
            padding: 15px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        tr:hover {
            background: rgba(255,255,255,0.03);
        }
        
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 5px 12px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .status-online {
            background: rgba(0,230,118,0.2);
            color: #00e676;
        }
        
        .status-offline {
            background: rgba(255,82,82,0.2);
            color: #ff5252;
        }
        
        .status-warning {
            background: rgba(255,152,0,0.2);
            color: #ff9800;
        }
        
        .btn-enter {
            background: linear-gradient(135deg, #00d4ff, #7b2ff7);
            border: none;
            padding: 8px 20px;
            border-radius: 25px;
            color: white;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s;
        }
        
        .btn-enter:hover {
            transform: scale(1.05);
        }
        
        .online-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #00e676;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .last-seen {
            font-size: 12px;
            font-family: monospace;
        }
        
        /* Modal dettaglio macchina */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(5px);
            z-index: 1000;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-radius: 30px;
            width: 90%;
            max-width: 1200px;
            max-height: 90vh;
            overflow-y: auto;
            margin: auto;
            border: 1px solid rgba(0,212,255,0.3);
        }
        
        .modal-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-close {
            background: none;
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
        }
        
        .modal-body {
            padding: 20px;
        }
        
        .iframe-container {
            width: 100%;
            height: 70vh;
            border-radius: 15px;
            overflow: hidden;
        }
        
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }
        
        @media (max-width: 768px) {
            th, td {
                padding: 10px;
                font-size: 12px;
            }
            .btn-enter {
                padding: 6px 12px;
                font-size: 11px;
            }
        }
        
        .refresh-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 8px 20px;
            border-radius: 25px;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div class="logo">
                <div class="logo-icon">🌿</div>
                <div>
                    <h1>NabulAir Cloud</h1>
                    <p style="font-size: 12px; opacity: 0.7;">Centrale Operativa Nazionale</p>
                </div>
            </div>
            <div class="stats-summary">
                <div class="stat-pill" id="totalMachines">📊 Totale: --</div>
                <div class="stat-pill" id="onlineMachines">🟢 Online: --</div>
                <div class="stat-pill" id="offlineMachines">🔴 Offline: --</div>
                <button class="refresh-btn" onclick="loadMachines()">🔄 Aggiorna</button>
            </div>
        </div>
    </div>
    
    <div class="container">
        <div class="machines-table">
            <table>
                <thead>
                    <tr>
                        <th>Cliente</th>
                        <th>Macchina</th>
                        <th>Stato</th>
                        <th>IP</th>
                        <th>Ultimo Contatto</th>
                        <th>Firmware</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="machinesList">
                    <tr><td colspan="7" style="text-align: center;">Caricamento macchine...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    
    <!-- Modal Dettaglio Macchina -->
    <div class="modal" id="machineModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">NabulAir - Milano Centro</h2>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <div class="modal-body">
                <div class="iframe-container">
                    <iframe id="machineIframe" src=""></iframe>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // Configurazione
        const CLOUD_API = '/api';
        
        // Carica lista macchine
        async function loadMachines() {
            try {
                const response = await fetch(`${CLOUD_API}/machines`);
                const data = await response.json();
                
                if (data.success) {
                    renderMachines(data.machines);
                    updateStats(data.machines);
                } else {
                    showError('Errore caricamento macchine');
                }
            } catch (error) {
                console.error('Errore:', error);
                document.getElementById('machinesList').innerHTML = 
                    '<tr><td colspan="7" style="text-align: center; color: #ff5252;">❌ Connessione al server fallita</td></tr>';
            }
        }
        
        // Render tabella
        function renderMachines(machines) {
            const tbody = document.getElementById('machinesList');
            
            if (machines.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align: center;">📭 Nessuna macchina registrata</td></tr>';
                return;
            }
            
            tbody.innerHTML = machines.map(machine => {
                const statusClass = machine.status === 'online' ? 'status-online' : 
                                   (machine.status === 'warning' ? 'status-warning' : 'status-offline');
                const statusText = machine.status === 'online' ? 'Online' : 
                                  (machine.status === 'warning' ? '⚠️ Attenzione' : 'Offline');
                
                const lastSeen = machine.last_seen ? new Date(machine.last_seen).toLocaleString() : 'Mai';
                
                return `
                    <tr>
                        <td>${escapeHtml(machine.client_name || '—')}</td>
                        <td><strong>${escapeHtml(machine.machine_name)}</strong><br><span style="font-size: 11px; opacity: 0.6;">${machine.mac_address}</span></td>
                        <td>
                            <span class="status-badge ${statusClass}">
                                ${machine.status === 'online' ? '<span class="online-dot"></span>' : ''}
                                ${statusText}
                            </span>
                        </td>
                        <td><span class="last-seen">${machine.sta_ip || '—'}</span></td>
                        <td><span class="last-seen">${lastSeen}</span></td>
                        <td>v${machine.firmware_version || '1.0'}</td>
                        <td>
                            <button class="btn-enter" onclick="openMachine(${machine.id}, '${escapeHtml(machine.machine_name)}', '${machine.sta_ip || machine.mac_address}')">
                                ▶️ ENTRARE
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');
        }
        
        // Aggiorna statistiche
        function updateStats(machines) {
            const total = machines.length;
            const online = machines.filter(m => m.status === 'online').length;
            const offline = machines.filter(m => m.status === 'offline').length;
            
            document.getElementById('totalMachines').innerHTML = `📊 Totale: ${total}`;
            document.getElementById('onlineMachines').innerHTML = `🟢 Online: ${online}`;
            document.getElementById('offlineMachines').innerHTML = `🔴 Offline: ${offline}`;
        }
        
        // Apri dettaglio macchina (iframe con la tua interfaccia remota)
        function openMachine(id, name, ip) {
            const modal = document.getElementById('machineModal');
            const iframe = document.getElementById('machineIframe');
            const title = document.getElementById('modalTitle');
            
            title.innerHTML = `🌿 ${name}`;
            
            // Carica la tua interfaccia remota con l'IP della macchina
            // Assicurati di avere remote.html nel tuo server o file locale
            iframe.src = `/remote.html?ip=${ip}`;
            
            modal.classList.add('active');
        }
        
        function closeModal() {
            const modal = document.getElementById('machineModal');
            const iframe = document.getElementById('machineIframe');
            modal.classList.remove('active');
            iframe.src = '';  // Ferma il refresh
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function showError(msg) {
            console.error(msg);
        }
        
        // Auto-refresh ogni 30 secondi
        loadMachines();
        setInterval(loadMachines, 30000);
    </script>
</body>
</html>
